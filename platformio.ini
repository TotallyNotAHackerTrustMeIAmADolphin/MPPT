; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_f072rb]
platform = ststm32
board = nucleo_f072rb
framework = stm32cube
board_build.mcu = stm32f072rbt6
board_build.f_cpu = 48000000L
;upload_protocol = dfu

monitor_dtr = 1
;monitor_port = COM6
monitor_speed = 115200

; This is the actual script that forces platformio into compiling the
; STM32CubeIDE project.
extra_scripts = pre:scripts/setup_cubemx_env_auto.py
; The project option containing the directory in which CubeMX resides
; custom_repo_location = ~
; Set to the same toolchain as STM32CubeIDE
; For the mapping see
; https://api.registry.platformio.org/v3/packages/platformio/tool/toolchain-gccarmnoneeabi
;platform_packages = toolchain-gccarmnoneeabi@1.90301.200702
platform_packages = toolchain-gccarmnoneeabi@1.120301.0

; The name of the library directory in which the linked resources will
; be placed.
lib_deps = STLinkedResources
; Additional Build Flags
; Example: build_flags = -D DEBUG -D FREERTOS_TOTAL_RUNTIME_TIMER
build_flags = 
	-Werror
	-Wall

; custom upload command, now we can upload without the NRST Pin
upload_protocol = blackmagic
upload_port = /dev/ttyACM1

[env:native]
platform = native
build_flags = -D NATIVE_TEST -I Core/Inc -I test/test_mppt
build_src_filter = +<Core/Src/mppt.c> -<Core/Src/main.c>
lib_ignore = STLinkedResources, STM32_USB_Device_Library-CDC, STM32_USB_Device_Library-Core
; upload_flags =
; 	-d1
; 	-s
; 	${platformio.packages_dir}\tool-openocd/openocd/scripts
; 	-f
; 	interface/stlink.cfg
; 	-c
; 	transport select hla_swd
; 	-f
; 	board/st_nucleo_f0.cfg
; 	-c
; 	reset_config none
; 	-c
; 	program {$SOURCE}  verify reset; shutdown;
; upload_command = openocd $UPLOAD_FLAGS